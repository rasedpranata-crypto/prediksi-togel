body {

.header-box {

.lights {

    width: 100%;

    justify-content: center;
    gap: 12px;
}

.lights span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    animation: blink 1.5s infinite alternate;
}

.lights span:nth-child(1) { background: red; }
.lights span:nth-child(2) { background: orange; animation-delay: 0.2s; }
.lights span:nth-child(3) { background: yellow; animation-delay: 0.4s; }
.lights span:nth-child(4) { background: lime; animation-delay: 0.6s; }
.lights span:nth-child(5) { background: cyan; animation-delay: 0.8s; }
.lights span:nth-child(6) { background: blue; animation-delay: 1s; }
.lights span:nth-child(7) { background: violet; animation-delay: 1.2s; }

@keyframes blink {
    0% { opacity: 0.3; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.6); }
}

.running-light {
    margin-top: 20px;
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg, transparent, cyan, transparent);
    background-size: 200px;
    animation: moveLight 2s linear infinite;
}

@keyframes moveLight {

.header {

    <div class="footer">⚠️ BIASAKAN UPS - UTAMAKAN PREDIKSI SENDIRI | 53 Pasaran Lengkap | Khusus TOTOMACAU 5D SORE & MALAM prediksi spesial</div>

<script>
// ==================== 53 PASARAN LENGKAP (TANPA SPASI PADA TOTOMACAU) ====================
const PASARAN = [
    "TOTOMACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "NEW YORK MIDDAY",
    "BANGKOK 0130", "CAROLINA DAY", "BRUNEI 02", "OREGON03", "OREGON06", "CALIFORNIA", "FLORIDA EVENING",
    "OREGON09", "NEW YORK EVENING", "BANGKOK 0930", "KENTUCKY EVENING", "CAROLINA EVENING", "CHELSEA11",
    "TOTOCAMBODIA", "OREGON12", "BULLSEYE", "POIPET12", "TOTOMACAU SIANG", "JAKARTA4D I", "SYDNEY",
    "BRUNEI 14", "CHELSEA15", "TOTOMACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630",
    "KING KONG 4D I", "SINGAPORE", "MAGNUM4D", "CHELSEA19", "TOTOMACAU MALAM I", "POIPET19", "PCSO",
    "KING KONG 4D II", "HUAHIN 2100", "CHELSEA21", "TOTOMACAU 5D MALAM", "NEVADA", "BRUNEI 21",
    "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "JAKARTA4D II", "TOTOMACAU MALAM III", "TOTOMALI 1530",
    "TOTOMALI 2030", "TOTOMALI 2330", "HOKI DRAW"
];

const SHIO = ["TIKUS", "KERBAU", "MACAN", "KELINCI", "NAGA", "ULAR", "KUDA", "KAMBING", "MONYET", "AYAM", "ANJING", "BABI"];

// ==================== PREDIKSI KHUSUS TOTOMACAU 5D (STATIS) ====================
const PREDIKSI_KHUSUS = {
    "TOTOMACAU 5D SORE": {
        bbfs: "7574271",
        angkaMain: "42978",
        angka5d: ["75069", "68200"],
        angka4d: ["6718", "2952", "6804", "1255"],
        angka3d: ["732", "501", "492", "312"],
        angka2d: ["10", "45", "21", "11", "66", "67", "15", "19", "45", "37"],
        colokBebas: "3/0",
        colokBebas2D: "84/75/16",
        colokShio: "KELINCI/TIKUS/BABI",
        investTwin: "11/44/22"
    },
    "TOTOMACAU 5D MALAM": {
        bbfs: "6616479",
        angkaMain: "71548",
        angka5d: ["60356", "55322"],
        angka4d: ["7172", "2345", "1948", "3806"],
        angka3d: ["526", "661", "605", "426"],
        angka2d: ["58", "89", "54", "62", "74", "75", "18", "12", "17", "37"],
        colokBebas: "4/4",
        colokBebas2D: "33/96/32",
        colokShio: "KUDA/KELINCI/KAMBING",
        investTwin: "22/77/44"
    }
};

// Seed harian untuk generate random (pasaran lain)
function getSeed() {
    const t = new Date();
    return t.getFullYear() * 366 + t.getMonth() * 32 + t.getDate();
}

function getNum(seed, max, offset) {
    const val = ((seed + offset) * 9301 + 49297) % 233280;
    return Math.floor(val / 233280 * max);
}

// Generate prediksi untuk pasaran biasa (random)
function getPrediksiRandom(pasaran) {
    const dailySeed = getSeed();
    let hash = 0;
    for (let i = 0; i < pasaran.length; i++) {
        hash = ((hash << 5) - hash) + pasaran.charCodeAt(i);
        hash = hash & hash;
    }
    hash = Math.abs(hash);
    const baseSeed = dailySeed + hash;
    
    let bbfsSet = new Set();
    for (let i = 0; i < 30; i++) {
        bbfsSet.add(getNum(baseSeed, 10, i * 2 + 100));
        if (bbfsSet.size === 7) break;
    }
    while (bbfsSet.size < 7) bbfsSet.add(getNum(baseSeed, 10, bbfsSet.size + 500));
    let bbfs = Array.from(bbfsSet).sort((a,b)=>a-b).join('');
    if (bbfs.length < 7) bbfs = bbfs.padEnd(7, '0');
    
    let mainSet = new Set();
    for (let i = 0; i < 20; i++) mainSet.add(getNum(baseSeed, 10, i + 300));
    let mainArr = Array.from(mainSet).slice(0,5);
    while (mainArr.length < 5) mainArr.push(getNum(baseSeed, 10, mainArr.length + 400));
    let angkaMain = mainArr.join('');
    
    let fourD = [];
    for (let i = 0; i < 4; i++) {
        fourD.push(`${getNum(baseSeed, 10, i*5+500)}${getNum(baseSeed, 10, i*5+501)}${getNum(baseSeed, 10, i*5+502)}${getNum(baseSeed, 10, i*5+503)}`);
    }
    
    let threeD = [];
    for (let i = 0; i < 4; i++) {
        threeD.push(`${getNum(baseSeed, 10, i*6+600)}${getNum(baseSeed, 10, i*6+601)}${getNum(baseSeed, 10, i*6+602)}`);
    }
    
    let twoD = [];
    for (let i = 0; i < 10; i++) {
        twoD.push(`${getNum(baseSeed, 10, i*7+700)}${getNum(baseSeed, 10, i*7+701)}`);
    }
    
    let colok = `${getNum(baseSeed, 10, 800)}/${getNum(baseSeed, 10, 801)}`;
    let cb2d = [];
    for (let i = 0; i < 3; i++) {
        cb2d.push(`${getNum(baseSeed, 10, 900+i*3)}${getNum(baseSeed, 10, 901+i*3)}`);
    }
    let colok2d = cb2d.join('/');
    
    let s1 = getNum(baseSeed, 12, 1000);
    let s2 = (s1 + getNum(baseSeed, 11, 1001) + 1) % 12;
    let s3 = (s2 + getNum(baseSeed, 10, 1002) + 1) % 12;
    let shio = `${SHIO[s1]}/${SHIO[s2]}/${SHIO[s3]}`;
    
    let t1 = getNum(baseSeed, 10, 1100);
    let t2 = getNum(baseSeed, 10, 1101);
    let t3 = getNum(baseSeed, 10, 1102);
    let twin = `${t1}/${t2}${t2}/${t3}${t3}`;
    
    return { bbfs, angkaMain, fourD, threeD, twoD, colok, colok2d, shio, twin, isKhusus: false };
}

// Get prediksi berdasarkan pasaran (khusus atau random)
function getPrediksi(pasaran) {
    if (PREDIKSI_KHUSUS[pasaran]) {
        const k = PREDIKSI_KHUSUS[pasaran];
        return {
            bbfs: k.bbfs,
            angkaMain: k.angkaMain,
            fourD: k.angka4d,
            threeD: k.angka3d,
            twoD: k.angka2d,
            colok: k.colokBebas,
            colok2d: k.colokBebas2D,
            shio: k.colokShio,
            twin: k.investTwin,
            angka5d: k.angka5d,
            isKhusus: true
        };
    }
    return getPrediksiRandom(pasaran);
}

function getTanggal() {
    const now = new Date();
    const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    return `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function getJam() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}

function formatTeks(pasaran) {
    const p = getPrediksi(pasaran);
    const tgl = getTanggal();
    let text = `Prediksi ${pasaran}\nHari ${tgl}\nBBFS KUAT: ${p.bbfs}\nAngka Main : ${p.angkaMain}`;
    if (p.isKhusus && p.angka5d) {
        text += `\n5D  : ${p.angka5d.join(' ')}  `;
    }
    text += `\n4D (BB): ${p.fourD.join(' ')}\n3D (BB) : ${p.threeD.join(' ')}\n2D (BB): ${p.twoD.join(' ')}\nColok Bebas : ${p.colok}\nColok bebas 2D : ${p.colok2d}\nColok Shio : ${p.shio}\nInvest Twin : ${p.twin}\nBiasakan UPS - UTAMAKAN PREDIKSI SENDIRI`;
    return text;
}

function toast(msg) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

async function copy(text, msg) {
    try {
        await navigator.clipboard.writeText(text);
        toast(`✅ ${msg}`);
    } catch(e) {
        let ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast(`✅ ${msg}`);
    }
}

function tampilkanSemua() {
    const stats = document.getElementById('searchStats');
    stats.style.display = 'block';
    stats.innerHTML = `📊 Menampilkan <span>${PASARAN.length}</span> Pasaran (SEMUA PASARAN) | Khusus TOTOMACAU 5D SORE & MALAM prediksi spesial`;
    
    let html = `<div class="markets-grid">`;
    for (let i = 0; i < PASARAN.length; i++) {
        const p = getPrediksi(PASARAN[i]);
        html += `
        <div class="market-item">
            <div class="market-header">
                <span class="market-name">🎲 ${PASARAN[i]}</span>
                <button class="copy-btn" data-market="${PASARAN[i].replace(/'/g, "\\'")}">📋 Copy</button>
            </div>
            <div class="market-content">
                <div class="market-row"><span class="market-row-label">BBFS KUAT:</span><span class="market-row-value">${p.bbfs}</span></div>
                <div class="market-row"><span class="market-row-label">Angka Main:</span><span class="market-row-value">${p.angkaMain}</span></div>
                ${p.isKhusus && p.angka5d ? `<div class="market-row"><span class="market-row-label">5D:</span><span class="market-row-value">${p.angka5d[0]} ${p.angka5d[1]}</span></div>` : ''}
                <div class="market-row"><span class="market-row-label">4D:</span><span class="market-row-value">${p.fourD[0]} ${p.fourD[1]}</span></div>
                <div class="market-row"><span class="market-row-label">3D:</span><span class="market-row-value">${p.threeD[0]} ${p.threeD[1]}</span></div>
                <div class="market-row"><span class="market-row-label">2D Top 5:</span><span class="market-row-value">${p.twoD.slice(0,5).join(' ')}</span></div>
                <div class="market-row"><span class="market-row-label">Colok:</span><span class="market-row-value">${p.colok} | ${p.colok2d}</span></div>
            </div>
        </div>`;
    }
    html += `</div>`;
    document.getElementById('contentArea').innerHTML = html;
    
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const market = btn.getAttribute('data-market');
            copy(formatTeks(market), `Prediksi ${market} disalin!`);
        };
    });
}

function cariPasaran() {
    const keyword = document.getElementById('searchInput').value.trim();
    const stats = document.getElementById('searchStats');
    
    if (keyword === "") {
        tampilkanSemua();
        return;
    }
    
    const hasil = PASARAN.filter(p => p.toLowerCase().includes(keyword.toLowerCase()));
    
    if (hasil.length === 0) {
        stats.style.display = 'block';
        stats.innerHTML = `🔍 <span>0</span> pasaran ditemukan. Coba kata kunci lain.`;
        document.getElementById('contentArea').innerHTML = `<div class="empty-search">😢 Tidak ada pasaran yang cocok dengan "<strong>${keyword}</strong>"<br><br>💡 Coba: TOTOMACAU, SYDNEY, HONGKONG, atau klik tombol TAMPILKAN ALL</div>`;
        return;
    }
    
    if (hasil.length === 1) {
        const p = getPrediksi(hasil[0]);
        const tgl = getTanggal();
        const jam = getJam();
        stats.style.display = 'none';
        
        let special5DRow = '';
        if (p.isKhusus && p.angka5d) {
            special5DRow = `<div class="pred-item"><div class="pred-label">5D (KHUSUS)</div><div class="pred-value">${p.angka5d.join(' · ')}</div></div>`;
        }
        
        document.getElementById('contentArea').innerHTML = `
        <div class="single-card">
            <div class="single-header">
                <div><h2>🎯 ${hasil[0]}</h2><div class="date">📅 ${tgl} | ${jam}</div></div>
                <button id="copySingleBtn" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);border:none;padding:10px 20px;border-radius:40px;font-weight:bold;cursor:pointer;">📋 COPY PREDIKSI</button>
            </div>
            <div class="prediction-grid">
                <div class="pred-item"><div class="pred-label">BBFS KUAT</div><div class="pred-value">${p.bbfs}</div></div>
                <div class="pred-item"><div class="pred-label">Angka Main</div><div class="pred-value">${p.angkaMain}</div></div>
                ${special5DRow}
                <div class="pred-item"><div class="pred-label">4D (BB)</div><div class="pred-value">${p.fourD.join(' · ')}</div></div>
                <div class="pred-item"><div class="pred-label">3D (BB)</div><div class="pred-value">${p.threeD.join(' · ')}</div></div>
                <div class="pred-item"><div class="pred-label">2D (BB)</div><div class="pred-value">${p.twoD.map(n => `<span class="number-badge">${n}</span>`).join('')}</div></div>
                <div class="pred-item"><div class="pred-label">Colok Bebas</div><div class="pred-value">${p.colok}</div></div>
                <div class="pred-item"><div class="pred-label">Colok Bebas 2D</div><div class="pred-value">${p.colok2d}</div></div>
                <div class="pred-item"><div class="pred-label">Colok Shio</div><div class="pred-value">${p.shio}</div></div>
                <div class="pred-item"><div class="pred-label">Invest Twin</div><div class="pred-value">${p.twin}</div></div>
            </div>
        </div>`;
        document.getElementById('copySingleBtn').onclick = () => copy(formatTeks(hasil[0]), `Prediksi ${hasil[0]} disalin!`);
    } else {
        stats.style.display = 'block';
        stats.innerHTML = `🔍 Menampilkan <span>${hasil.length}</span> pasaran dari total ${PASARAN.length} (pencarian: ${keyword})`;
        
        let html = `<div class="markets-grid">`;
        for (let i = 0; i < hasil.length; i++) {
            const p = getPrediksi(hasil[i]);
            html += `
            <div class="market-item">
                <div class="market-header">
                    <span class="market-name">🎲 ${hasil[i]}</span>
                    <button class="copy-result-btn" data-market="${hasil[i].replace(/'/g, "\\'")}">📋 Copy</button>
                </div>
                <div class="market-content">
                    <div class="market-row"><span class="market-row-label">BBFS KUAT:</span><span class="market-row-value">${p.bbfs}</span></div>
                    <div class="market-row"><span class="market-row-label">Angka Main:</span><span class="market-row-value">${p.angkaMain}</span></div>
                    ${p.isKhusus && p.angka5d ? `<div class="market-row"><span class="market-row-label">5D:</span><span class="market-row-value">${p.angka5d[0]} ${p.angka5d[1]}</span></div>` : ''}
                    <div class="market-row"><span class="market-row-label">4D:</span><span class="market-row-value">${p.fourD[0]}</span></div>
                    <div class="market-row"><span class="market-row-label">3D:</span><span class="market-row-value">${p.threeD[0]}</span></div>
                    <div class="market-row"><span class="market-row-label">2D Top 5:</span><span class="market-row-value">${p.twoD.slice(0,5).join(' ')}</span></div>
                </div>
            </div>`;
        }
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        
        document.querySelectorAll('.copy-result-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const market = btn.getAttribute('data-market');
                copy(formatTeks(market), `Prediksi ${market} disalin!`);
            };
        });
    }
}

function updateJam() {
    document.getElementById('dateTime').innerHTML = getTanggal() + ' | ' + getJam();
}

document.addEventListener('DOMContentLoaded', () => {
    const select = document.getElementById('marketSelect');
    select.innerHTML = '<option value="">-- Pilih Pasaran --</option>';
    PASARAN.forEach(p => {
        let opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
    });
    
    select.onchange = () => {
        if (select.value) {
            document.getElementById('searchInput').value = select.value;
            cariPasaran();
        }
    };
    
    document.getElementById('searchInput').oninput = cariPasaran;
    document.getElementById('showAllBtn').onclick = () => {
        document.getElementById('searchInput').value = '';
        tampilkanSemua();
    };
    
    document.getElementById('copyAllBtn').onclick = () => {
        let semuaTeks = '';
        for (let i = 0; i < PASARAN.length; i++) {
            semuaTeks += formatTeks(PASARAN[i]);
            if (i < PASARAN.length - 1) semuaTeks += '\n\n';
        }
        copy(semuaTeks, 'Semua 53 pasaran berhasil disalin!');
    };
    
    updateJam();
    setInterval(updateJam, 1000);
    
    tampilkanSemua();
});
</script>
</body>
</html>
