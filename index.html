 
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ PREDIKSI TOGEL ELLEN CRISTIAN ✨ - Langit Malam Berbintang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1a3a 0%, #0a0f1e 50%, #03060c 100%);
            font-family: 'Poppins', 'Inter', sans-serif;
            min-height: 100vh;
            color: #eef5ff;
            position: relative;
            overflow-x: hidden;
        }

        /* Animasi bintang jatuh dan burung salju */
        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 10px #fff, 0 0 20px #ffd700; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .star-falling {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 1.2rem;
            animation: fall linear forwards;
        }

        .snow-bird {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            font-size: 1.5rem;
            animation: float 3s ease-in-out infinite, fall 8s linear forwards;
        }

        .bg-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-static {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding: 1.5rem;
        }

        /* Header mewah bergerak dan menyala dengan efek neon */
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .glow-text {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF6B6B, #FF1493, #FFD700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 2s ease infinite, textGlow 1.2s ease-in-out infinite;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 105, 180, 0.5);
            display: inline-block;
            padding: 0.2rem 1rem;
            position: relative;
        }

        .glow-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            filter: blur(20px);
            z-index: -1;
            animation: pulseGlow 1.5s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ff6b6b; }
            50% { text-shadow: 0 0 30px #ffd700, 0 0 50px #ff1493, 0 0 70px #ff6b6b; }
            100% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ff6b6b; }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: #b0d4ff;
            border-top: 1px solid rgba(100, 150, 255, 0.6);
            display: inline-block;
            padding-top: 10px;
            margin-top: 8px;
            text-shadow: 0 0 5px #4a90e2;
        }

        /* Selector Card dengan efek kaca biru langit */
        .selector-card {
            background: rgba(25, 45, 75, 0.65);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            border: 1px solid rgba(100, 180, 255, 0.6);
            padding: 1rem 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .label-market {
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #7bc5ff, #4a90e2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .market-select {
            background: #0a1428;
            border: 1px solid #4a90e2;
            border-radius: 2.5rem;
            padding: 0.7rem 1.5rem;
            color: #e0f0ff;
            font-weight: 500;
            font-size: 0.9rem;
            width: 260px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', monospace;
        }

        .market-select:hover, .market-select:focus {
            border-color: #7bc5ff;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.6);
            outline: none;
        }

        .date-badge {
            background: rgba(74, 144, 226, 0.3);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b0e0ff;
            border: 1px solid rgba(100, 180, 255, 0.4);
        }

        .auto-update-badge {
            background: rgba(76, 175, 80, 0.25);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #7bc5ff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #4a90e2, #2c5a9e);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        .copy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(74, 144, 226, 0.8);
            background: linear-gradient(135deg, #7bc5ff, #4a90e2);
        }

        /* Card Prediksi Utama dengan efek biru langit gradien */
        .prediction-card {
            background: linear-gradient(145deg, rgba(20, 40, 65, 0.95), rgba(10, 20, 40, 0.95));
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(100, 180, 255, 0.5);
            padding: 1.8rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .prediction-card:hover {
            border-color: #7bc5ff;
            box-shadow: 0 30px 45px -12px rgba(74, 144, 226, 0.4);
        }

        .market-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7bc5ff, #4a90e2, #2c5a9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .date-info {
            font-size: 0.85rem;
            color: #9acdff;
            margin-bottom: 1.5rem;
            border-left: 3px solid #4a90e2;
            padding-left: 12px;
        }

        .prediction-row {
            margin-bottom: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px dashed rgba(100, 180, 255, 0.3);
            padding-bottom: 0.8rem;
        }

        .pred-label {
            font-weight: 700;
            min-width: 130px;
            font-size: 0.9rem;
            color: #7bc5ff;
            letter-spacing: 0.5px;
        }

        .pred-value {
            font-weight: 600;
            font-size: 1rem;
            color: #f0f8ff;
            word-break: break-word;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .pred-value.highlight {
            color: #ffd966;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #ffb347;
        }

        .note-ups {
            margin-top: 1.2rem;
            background: rgba(74, 144, 226, 0.15);
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: #b0e0ff;
            border-left: 3px solid #4a90e2;
        }

        .update-info {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #7bc5ff;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #4a90e2, #2c5a9e);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .footer-info {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6c8eb0;
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .dashboard-container { padding: 1rem; }
            .glow-text { font-size: 1.4rem; letter-spacing: 2px; }
            .prediction-card { padding: 1.2rem; }
            .pred-label { min-width: 100px; font-size: 0.75rem; }
            .pred-value { font-size: 0.8rem; }
            .market-title { font-size: 1.2rem; flex-direction: column; align-items: flex-start; }
            .copy-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="bg-stars" id="starsContainer"></div>
    
    <div class="dashboard-container">
        <div class="brand-header">
            <div class="glow-text">
                ✨ PREDIKSI TOGEL ELLEN CRISTIAN ✨
            </div>
            <div class="subtitle">
                <i class="fas fa-star"></i> MASTER PREDIKSI BINTANG TIMUR <i class="fas fa-feather-alt"></i>
            </div>
        </div>

        <div class="selector-card">
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <span class="label-market"><i class="fas fa-map-marker-alt"></i> PASARAN PREMIUM :</span>
                <select id="marketSelect" class="market-select">
                    <!-- options via js -->
                </select>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <div class="auto-update-badge">
                    <i class="fas fa-sync-alt fa-fw"></i> <span id="updateStatus">UPDATE HARIAN</span>
                </div>
                <div class="date-badge">
                    <i class="far fa-calendar-alt"></i> <span id="currentDate"></span>
                </div>
                <button id="copyButton" class="copy-btn">
                    <i class="fas fa-copy"></i> COPY PREDIKSI
                </button>
            </div>
        </div>

        <div id="predictionContainer">
            <!-- Dynamic prediction card -->
        </div>
        <div class="update-info" id="updateInfo">
            <i class="fas fa-clock"></i> ✨ Prediksi otomatis berganti setiap hari | Bintang keberanian menyertaimu ✨
        </div>
        <div class="footer-info">
            <i class="fas fa-crown"></i> Biasakan UPS - UTAMAKAN PREDIKSI SENDIRI | © Ellen Cristian Prediction
        </div>
    </div>

    <script>
        // ============================================================
        // EFEK BINTANG JATUH & BURUNG SALJU BERJATUHAN
        // ============================================================
        
        // Membuat bintang statis di background
        function createStaticStars() {
            const starsContainer = document.getElementById('starsContainer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star-static';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // Membuat bintang jatuh
        function createFallingStar() {
            const star = document.createElement('div');
            star.className = 'star-falling';
            star.innerHTML = ['⭐', '✨', '💫', '🌟', '⭐', '✨'][Math.floor(Math.random() * 6)];
            star.style.left = Math.random() * 100 + '%';
            star.style.fontSize = (Math.random() * 20 + 15) + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = '0s';
            document.body.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, 5000);
        }
        
        // Membuat burung salju/angsa terbang
        function createSnowBird() {
            const bird = document.createElement('div');
            bird.className = 'snow-bird';
            const birds = ['🕊️', '🦢', '❄️', '🕊️', '✨', '🦩'];
            bird.innerHTML = birds[Math.floor(Math.random() * birds.length)];
            bird.style.left = Math.random() * 100 + '%';
            bird.style.fontSize = (Math.random() * 20 + 20) + 'px';
            bird.style.animationDuration = (Math.random() * 6 + 5) + 's';
            bird.style.animationDelay = '0s';
            document.body.appendChild(bird);
            
            setTimeout(() => {
                bird.remove();
            }, 8000);
        }
        
        // Interval untuk membuat bintang jatuh dan burung
        setInterval(() => {
            if (Math.random() > 0.6) createFallingStar();
        }, 800);
        
        setInterval(() => {
            if (Math.random() > 0.7) createSnowBird();
        }, 2000);
        
        // ============================================================
        // DATA PREDIKSI OTOMATIS BERUBAH SETIAP HARI
        // ============================================================
        
        const marketList = [
            "TOTO MACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "NEW YORK MIDDAY", "BANGKOK 0130",
            "CAROLINA DAY", "BRUNEI 02", "OREGON03", "OREGON06", "CALIFORNIA", "FLORIDA EVENING", "OREGON09",
            "NEW YORK EVENING", "BANGKOK 0930", "KENTUCKY EVENING", "CAROLINA EVENING", "CHELSEA11", "TOTOCAMBODIA",
            "OREGON12", "BULLSEYE", "POIPET12", "TOTOMACAU SIANG", "JAKARTA4D I", "SYDNEY", "BRUNEI 14", "CHELSEA15",
            "TOTO MACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630", "KING KONG 4D I", "SINGAPORE", "MAGNUM4D",
            "CHELSEA19", "TOTOMACAU MALAM I", "POIPET19", "PCSO", "KING KONG 4D II", "HUAHIN 2100", "CHELSEA21",
            "TOTO MACAU 5D MALAM", "NEVADA", "BRUNEI 21", "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "JAKARTA4D II",
            "TOTOMACAU MALAM III", "TOTOMALI 1530", "TOTOMALI 2030", "TOTOMALI 2330", "HOKI DRAW", "ALL"
        ];
        
        function getDailySeed() {
            const today = new Date();
            return today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
        }
        
        function getMarketSeed(marketName, dailySeed) {
            let hash = dailySeed;
            for (let i = 0; i < marketName.length; i++) {
                hash = ((hash << 5) - hash) + marketName.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        function generatePredictionForMarket(marketName) {
            const dailySeed = getDailySeed();
            const seed = getMarketSeed(marketName, dailySeed);
            
            const getDigit = (offset, max) => {
                return (seed + offset + dailySeed) % max;
            };
            
            let bbfsKuat = "";
            for (let i = 0; i < 7; i++) {
                bbfsKuat += getDigit(i * 13 + 7, 10).toString();
            }
            
            let angkaMain = "";
            for (let i = 0; i < 5; i++) {
                angkaMain += getDigit(i * 17 + 11, 10).toString();
            }
            
            let arr4d = [];
            for (let i = 0; i < 4; i++) {
                let num = getDigit(i * 131 + 53, 10000);
                arr4d.push(num.toString().padStart(4, '0'));
            }
            let fourD = arr4d.join(" ");
            
            let arr3d = [];
            for (let i = 0; i < 4; i++) {
                let num = getDigit(i * 97 + 29, 1000);
                arr3d.push(num.toString().padStart(3, '0'));
            }
            let threeD = arr3d.join(" ");
            
            let arr2d = [];
            for (let i = 0; i < 10; i++) {
                let num = getDigit(i * 23 + 41, 100);
                arr2d.push(num.toString().padStart(2, '0'));
            }
            let twoD = arr2d.join(" ");
            
            let cb1 = getDigit(101, 10).toString();
            let cb2 = getDigit(157, 10).toString();
            let colokBebas = `${cb1}/${cb2}`;
            
            let cb2d1 = getDigit(211, 100).toString().padStart(2, '0');
            let cb2d2 = getDigit(277, 100).toString().padStart(2, '0');
            let cb2d3 = getDigit(331, 100).toString().padStart(2, '0');
            let colokBebas2D = `${cb2d1}/${cb2d2}/${cb2d3}`;
            
            const shioList = ["TIKUS", "KERBAU", "HARIMAU", "KELINCI", "NAGA", "ULAR", "KUDA", "KAMBING", "MONYET", "AYAM", "ANJING", "BABI"];
            let shio1 = shioList[getDigit(19, 12)];
            let shio2 = shioList[getDigit(47, 12)];
            let shio3 = shioList[getDigit(83, 12)];
            let colokShio = `${shio1}/${shio2}/${shio3}`;
            
            let twin1 = getDigit(211, 9).toString().repeat(2);
            let twin2 = getDigit(313, 9).toString().repeat(2);
            let twin3 = getDigit(419, 9).toString().repeat(2);
            let investTwin = `${twin1}/${twin2}/${twin3}`;
            
            return { bbfsKuat, angkaMain, fourD, threeD, twoD, colokBebas, colokBebas2D, colokShio, investTwin };
        }
        
        function generateAllPrediction() {
            const specialMarket = generatePredictionForMarket("TOTO MACAU PAGI");
            const market2 = generatePredictionForMarket("HONGKONG");
            const market3 = generatePredictionForMarket("SYDNEY");
            return {
                bbfsKuat: specialMarket.bbfsKuat.slice(0, 3) + market2.bbfsKuat.slice(2, 5) + market3.bbfsKuat.slice(4, 7),
                angkaMain: specialMarket.angkaMain.slice(0, 2) + market2.angkaMain.slice(1, 4) + market3.angkaMain.slice(3, 5),
                fourD: specialMarket.fourD.split(" ").slice(0, 2).concat(market2.fourD.split(" ").slice(1, 3)).join(" "),
                threeD: specialMarket.threeD.split(" ").slice(0, 2).concat(market3.threeD.split(" ").slice(1, 3)).join(" "),
                twoD: specialMarket.twoD.split(" ").slice(0, 4).concat(market2.twoD.split(" ").slice(3, 7)).concat(market3.twoD.split(" ").slice(6, 9)).join(" "),
                colokBebas: specialMarket.colokBebas.split("/")[0] + "/" + market2.colokBebas.split("/")[1],
                colokBebas2D: specialMarket.colokBebas2D.split("/")[0] + "/" + market2.colokBebas2D.split("/")[1] + "/" + market3.colokBebas2D.split("/")[2],
                colokShio: specialMarket.colokShio.split("/")[0] + "/" + market2.colokShio.split("/")[1] + "/KELINCI",
                investTwin: specialMarket.investTwin.split("/")[0] + "/" + market2.investTwin.split("/")[1] + "/99"
            };
        }
        
        let marketDataCache = null;
        let cachedDate = null;
        
        function getMarketData() {
            const today = new Date().toDateString();
            if (marketDataCache && cachedDate === today) return marketDataCache;
            
            const newData = {};
            marketList.forEach(market => {
                newData[market] = market === "ALL" ? generateAllPrediction() : generatePredictionForMarket(market);
            });
            marketDataCache = newData;
            cachedDate = today;
            
            const updateStatus = document.getElementById("updateStatus");
            if (updateStatus) updateStatus.innerHTML = '<i class="fas fa-check-circle"></i> ' + new Date().toLocaleDateString('id-ID');
            return newData;
        }
        
        function getFormattedDate() {
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            const now = new Date();
            return `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        
        function getPredictionText(marketName) {
            const pred = getMarketData()[marketName];
            const dateStr = getFormattedDate();
            return `Prediksi ${marketName}\nHari ${dateStr}\nBBFS KUAT: ${pred.bbfsKuat}\nAngka Main : ${pred.angkaMain}\n4D (BB): ${pred.fourD}\n3D (BB) : ${pred.threeD}\n2D (BB): ${pred.twoD}\nColok Bebas : ${pred.colokBebas}\nColok bebas 2D : ${pred.colokBebas2D}\nColok Shio : ${pred.colokShio}\nInvest Twin : ${pred.investTwin}\nBiasakan UPS - UTAMAKAN PREDIKSI SENDIRI`;
        }
        
        function renderPrediction(selectedMarket) {
            const container = document.getElementById("predictionContainer");
            const pred = getMarketData()[selectedMarket];
            const dateStr = getFormattedDate();
            
            container.innerHTML = `
                <div class="prediction-card">
                    <div class="market-title">
                        <div><i class="fas fa-chart-simple"></i> Prediksi ${selectedMarket}</div>
                    </div>
                    <div class="date-info"><i class="far fa-calendar-check"></i> Hari ${dateStr}</div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-chart-line"></i> BBFS KUAT:</div><div class="pred-value highlight">${pred.bbfsKuat}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-bullseye"></i> Angka Main :</div><div class="pred-value">${pred.angkaMain}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-th-large"></i> 4D (BB) :</div><div class="pred-value">${pred.fourD}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-cubes"></i> 3D (BB) :</div><div class="pred-value">${pred.threeD}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-layer-group"></i> 2D (BB) :</div><div class="pred-value">${pred.twoD}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-hand-peace"></i> Colok Bebas :</div><div class="pred-value">${pred.colokBebas}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-hand-peace"></i> Colok bebas 2D :</div><div class="pred-value">${pred.colokBebas2D}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-dragon"></i> Colok Shio :</div><div class="pred-value">${pred.colokShio}</div></div>
                    <div class="prediction-row"><div class="pred-label"><i class="fas fa-chart-simple"></i> Invest Twin :</div><div class="pred-value">${pred.investTwin}</div></div>
                    <div class="note-ups"><i class="fas fa-exclamation-triangle"></i> Biasakan UPS - UTAMAKAN PREDIKSI SENDIRI | Result dapat berubah, tetap bijak bermain.</div>
                </div>
            `;
        }
        
        function populateSelect() {
            const selectEl = document.getElementById("marketSelect");
            selectEl.innerHTML = "";
            marketList.forEach(market => {
                const option = document.createElement("option");
                option.value = market;
                option.textContent = market;
                if (market === "TOTO MACAU PAGI") option.selected = true;
                selectEl.appendChild(option);
            });
        }
        
        function showToast(message) {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        async function copyPrediction() {
            const market = document.getElementById("marketSelect").value;
            const text = getPredictionText(market);
            try {
                await navigator.clipboard.writeText(text);
                showToast(`✓ Prediksi ${market} berhasil disalin! ✨`);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast(`✓ Prediksi ${market} berhasil disalin! ✨`);
            }
        }
        
        let lastCheckedDate = new Date().toDateString();
        function checkDateChange() {
            const currentDate = new Date().toDateString();
            if (currentDate !== lastCheckedDate) {
                marketDataCache = null;
                cachedDate = null;
                lastCheckedDate = currentDate;
                document.getElementById("currentDate").innerText = getFormattedDate();
                const select = document.getElementById("marketSelect");
                renderPrediction(select.value);
                showToast("📅 Prediksi otomatis diperbarui untuk hari ini! 🌟");
            }
        }
        
        createStaticStars();
        document.addEventListener("DOMContentLoaded", () => {
            populateSelect();
            document.getElementById("currentDate").innerText = getFormattedDate();
            renderPrediction("TOTO MACAU PAGI");
            document.getElementById("marketSelect").addEventListener("change", (e) => renderPrediction(e.target.value));
            document.getElementById("copyButton").addEventListener("click", copyPrediction);
            setInterval(checkDateChange, 60000);
        });
    </script>
</body>
</html>
