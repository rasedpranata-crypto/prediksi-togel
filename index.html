<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>DASHBORD PREDIKSI TOGEL ⚡ | ELLEN CRISTIAN</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at top, #001933, #000);
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

.header-box {
    width: 100%;
    margin: 0 auto 30px auto;
    padding: 30px;
    border-radius: 40px;
    text-align: center;
    background: #020617;
    box-shadow: 0 0 10px #00aaff, 0 0 20px #00ccff;
    animation: glowPulse 2s infinite alternate;
    position: relative;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px #00aaff; }
    100% { box-shadow: 0 0 40px #66ffff; }
}

.rainbow-text {
    font-size: 42px;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
    background-size: 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 4s linear infinite;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

.nama {
    font-size: 28px;
    font-weight: bold;
    color: #66ccff;
    margin-top: 10px;
    text-shadow: 0 0 5px #00ccff;
}

.lights {
    position: absolute;
    top: -12px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 12px;
}

.lights span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    animation: blink 1.5s infinite alternate;
}

.lights span:nth-child(1) { background: red; }
.lights span:nth-child(2) { background: orange; animation-delay: 0.2s; }
.lights span:nth-child(3) { background: yellow; animation-delay: 0.4s; }
.lights span:nth-child(4) { background: lime; animation-delay: 0.6s; }
.lights span:nth-child(5) { background: cyan; animation-delay: 0.8s; }
.lights span:nth-child(6) { background: blue; animation-delay: 1s; }
.lights span:nth-child(7) { background: violet; animation-delay: 1.2s; }

@keyframes blink {
    0% { opacity: 0.3; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.6); }
}

.running-light {
    margin-top: 20px;
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg, transparent, cyan, transparent);
    background-size: 200px;
    animation: moveLight 2s linear infinite;
}

@keyframes moveLight {
    0% { background-position: -200px; }
    100% { background-position: 200px; }
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    font-size: 1.5rem;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.control-panel {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    justify-content: space-between;
    border: 1px solid rgba(251, 191, 36, 0.3);
}

.search-group {
    flex: 2;
    min-width: 220px;
}

.search-group input {
    width: 100%;
    background: #1e293b;
    border: 1px solid #fbbf24;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    outline: none;
}

.select-group {
    display: flex;
    align-items: center;
    gap: 15px;
}

.select-group label {
    color: #fbbf24;
    font-weight: 600;
}

select {
    background: #1e293b;
    border: 1px solid #fbbf24;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    min-width: 200px;
}

.btn-group {
    display: flex;
    gap: 10px;
}

button {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
}

.btn-all {
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    color: white;
}

.btn-show-all {
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
}

.date-info {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 8px 16px;
    border-radius: 40px;
    color: #fbbf24;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
}

.search-stats {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 40px;
    padding: 8px 20px;
    margin-bottom: 20px;
    color: #cbd5e1;
    font-size: 0.85rem;
    text-align: center;
}

.search-stats span {
    color: #fbbf24;
    font-weight: bold;
}

.markets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
}

.market-item {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 20px;
    border: 1px solid rgba(251, 191, 36, 0.3);
    overflow: hidden;
    transition: transform 0.2s;
}

.market-item:hover {
    transform: translateY(-3px);
    border-color: rgba(251, 191, 36, 0.6);
}

.market-header {
    background: rgba(0, 0, 0, 0.5);
    padding: 12px 15px;
    border-bottom: 1px solid rgba(251, 191, 36, 0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.market-name {
    color: #fbbf24;
    font-weight: bold;
    font-size: 0.9rem;
}

.copy-market-btn {
    background: rgba(251, 191, 36, 0.2);
    border: none;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    cursor: pointer;
    color: #fbbf24;
}

.market-content {
    padding: 12px 15px;
}

.market-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.8rem;
}

.market-row-label {
    color: #94a3b8;
}

.market-row-value {
    color: #fde047;
    font-weight: 600;
}

.single-card {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 24px;
    border: 1px solid rgba(251, 191, 36, 0.3);
    overflow: hidden;
}

.single-header {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 20px;
    border-bottom: 1px solid #fbbf24;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.single-header h2 {
    color: #fbbf24;
    font-size: 1.5rem;
}

.prediction-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
    padding: 20px;
}

.pred-item {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 16px;
    padding: 15px;
    border-left: 3px solid #fbbf24;
}

.pred-label {
    color: #fbbf24;
    font-size: 0.7rem;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.pred-value {
    color: #fde047;
    font-size: 1.1rem;
    font-weight: bold;
}

.number-badge {
    display: inline-block;
    background: #1e293b;
    padding: 4px 10px;
    border-radius: 20px;
    margin: 3px;
    font-size: 0.85rem;
}

.footer {
    text-align: center;
    margin-top: 30px;
    padding: 15px;
    color: #64748b;
    font-size: 0.7rem;
    border-top: 1px solid rgba(251, 191, 36, 0.2);
}

.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #22c55e;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-weight: bold;
    z-index: 1000;
}

.empty-search {
    text-align: center;
    padding: 50px;
    background: rgba(0,0,0,0.3);
    border-radius: 40px;
    color: #94a3b8;
    border: 1px dashed #fbbf24;
}

@media (max-width: 768px) {
    .control-panel { flex-direction: column; align-items: stretch; }
    .markets-grid { grid-template-columns: 1fr; }
    .rainbow-text { font-size: 28px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header-box" style="position: relative;">
        <div class="lights"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <div class="rainbow-text">✨ DASHBORD PREDIKSI TOGEL ⚡</div>
        <div class="nama">ELLEN CRISTIAN</div>
        <div class="running-light"></div>
    </div>

    <div class="header">
        <h1>🔍 JANGAN TERLALU SEMANGAT BALAS LC NYA BOS AWAS TRAFIK🔍</h1>
    </div>

    <div class="control-panel">
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="🔎 Cari pasaran... (contoh: MACAU, SYDNEY, HONGKONG)" autocomplete="off">
        </div>
        <div class="select-group">
            <label>📌 PILIH PASARAN</label>
            <select id="marketSelect"></select>
        </div>
        <div class="btn-group">
            <button id="showAllBtn" class="btn-show-all">📋 TAMPILKAN ALL (53 PASARAN)</button>
            <button id="copyAllBtn" class="btn-all">📋 COPY ALL</button>
        </div>
        <div class="date-info" id="dateTime"></div>
    </div>

    <div id="searchStats" class="search-stats"></div>
    <div id="contentArea"></div>
    <div class="footer">⚠️ BIASAKAN UPS - UTAMAKAN PREDIKSI SENDIRI | 53 Pasaran Lengkap</div>
</div>

<script>
// ==================== 53 PASARAN LENGKAP ====================
const PASARAN = [
    "TOTO MACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "NEW YORK MIDDAY",
    "BANGKOK 0130", "CAROLINA DAY", "BRUNEI 02", "OREGON03", "OREGON06", "CALIFORNIA", "FLORIDA EVENING",
    "OREGON09", "NEW YORK EVENING", "BANGKOK 0930", "KENTUCKY EVENING", "CAROLINA EVENING", "CHELSEA11",
    "TOTOCAMBODIA", "OREGON12", "BULLSEYE", "POIPET12", "TOTOMACAU SIANG", "JAKARTA4D I", "SYDNEY",
    "BRUNEI 14", "CHELSEA15", "TOTO MACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630",
    "KING KONG 4D I", "SINGAPORE", "MAGNUM4D", "CHELSEA19", "TOTOMACAU MALAM I", "POIPET19", "PCSO",
    "KING KONG 4D II", "HUAHIN 2100", "CHELSEA21", "TOTO MACAU 5D MALAM", "NEVADA", "BRUNEI 21",
    "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "JAKARTA4D II", "TOTOMACAU MALAM III", "TOTOMALI 1530",
    "TOTOMALI 2030", "TOTOMALI 2330", "HOKI DRAW"
];

const SHIO = ["TIKUS", "KERBAU", "MACAN", "KELINCI", "NAGA", "ULAR", "KUDA", "KAMBING", "MONYET", "AYAM", "ANJING", "BABI"];

// Seed harian
function getSeed() {
    const t = new Date();
    return t.getFullYear() * 366 + t.getMonth() * 32 + t.getDate();
}

// Generate angka random berdasarkan seed
function getNum(seed, max, offset) {
    const val = ((seed + offset) * 9301 + 49297) % 233280;
    return Math.floor(val / 233280 * max);
}

// Generate prediksi untuk satu pasaran
function getPrediksi(pasaran) {
    const dailySeed = getSeed();
    let hash = 0;
    for (let i = 0; i < pasaran.length; i++) {
        hash = ((hash << 5) - hash) + pasaran.charCodeAt(i);
        hash = hash & hash;
    }
    hash = Math.abs(hash);
    const baseSeed = dailySeed + hash;
    
    // BBFS 7 digit
    let bbfsSet = new Set();
    for (let i = 0; i < 30; i++) {
        bbfsSet.add(getNum(baseSeed, 10, i * 2 + 100));
        if (bbfsSet.size === 7) break;
    }
    while (bbfsSet.size < 7) bbfsSet.add(getNum(baseSeed, 10, bbfsSet.size + 500));
    let bbfs = Array.from(bbfsSet).sort((a,b)=>a-b).join('');
    if (bbfs.length < 7) bbfs = bbfs.padEnd(7, '0');
    
    // Angka Main 5 digit
    let mainSet = new Set();
    for (let i = 0; i < 20; i++) mainSet.add(getNum(baseSeed, 10, i + 300));
    let mainArr = Array.from(mainSet).slice(0,5);
    while (mainArr.length < 5) mainArr.push(getNum(baseSeed, 10, mainArr.length + 400));
    let angkaMain = mainArr.join('');
    
    // 4D
    let fourD = [];
    for (let i = 0; i < 4; i++) {
        fourD.push(`${getNum(baseSeed, 10, i*5+500)}${getNum(baseSeed, 10, i*5+501)}${getNum(baseSeed, 10, i*5+502)}${getNum(baseSeed, 10, i*5+503)}`);
    }
    
    // 3D
    let threeD = [];
    for (let i = 0; i < 4; i++) {
        threeD.push(`${getNum(baseSeed, 10, i*6+600)}${getNum(baseSeed, 10, i*6+601)}${getNum(baseSeed, 10, i*6+602)}`);
    }
    
    // 2D
    let twoD = [];
    for (let i = 0; i < 10; i++) {
        twoD.push(`${getNum(baseSeed, 10, i*7+700)}${getNum(baseSeed, 10, i*7+701)}`);
    }
    
    let colok = `${getNum(baseSeed, 10, 800)}/${getNum(baseSeed, 10, 801)}`;
    let cb2d = [];
    for (let i = 0; i < 3; i++) {
        cb2d.push(`${getNum(baseSeed, 10, 900+i*3)}${getNum(baseSeed, 10, 901+i*3)}`);
    }
    let colok2d = cb2d.join('/');
    
    let s1 = getNum(baseSeed, 12, 1000);
    let s2 = (s1 + getNum(baseSeed, 11, 1001) + 1) % 12;
    let s3 = (s2 + getNum(baseSeed, 10, 1002) + 1) % 12;
    let shio = `${SHIO[s1]}/${SHIO[s2]}/${SHIO[s3]}`;
    
    let t1 = getNum(baseSeed, 10, 1100);
    let t2 = getNum(baseSeed, 10, 1101);
    let t3 = getNum(baseSeed, 10, 1102);
    let twin = `${t1}/${t2}${t2}/${t3}${t3}`;
    
    return { bbfs, angkaMain, fourD, threeD, twoD, colok, colok2d, shio, twin };
}

// Format tanggal
function getTanggal() {
    const now = new Date();
    const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    return `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function getJam() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}

// Format teks prediksi
function formatTeks(pasaran) {
    const p = getPrediksi(pasaran);
    const tgl = getTanggal();
    return `Prediksi ${pasaran}
Hari ${tgl}
BBFS KUAT: ${p.bbfs}
Angka Main : ${p.angkaMain}
4D (BB): ${p.fourD.join(' ')}
3D (BB) : ${p.threeD.join(' ')}
2D (BB): ${p.twoD.join(' ')}
Colok Bebas : ${p.colok}
Colok bebas 2D : ${p.colok2d}
Colok Shio : ${p.shio}
Invest Twin : ${p.twin}
Biasakan UPS - UTAMAKAN PREDIKSI SENDIRI`;
}

// Toast
function toast(msg) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

// Copy ke clipboard
async function copy(text, msg) {
    try {
        await navigator.clipboard.writeText(text);
        toast(`✅ ${msg}`);
    } catch(e) {
        let ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast(`✅ ${msg}`);
    }
}

// TAMPILKAN SEMUA PASARAN (ALL)
function tampilkanSemua() {
    const stats = document.getElementById('searchStats');
    stats.style.display = 'block';
    stats.innerHTML = `📊 Menampilkan <span>${PASARAN.length}</span> Pasaran (SEMUA PASARAN)`;
    
    let html = `<div class="markets-grid">`;
    for (let i = 0; i < PASARAN.length; i++) {
        const p = getPrediksi(PASARAN[i]);
        html += `
        <div class="market-item">
            <div class="market-header">
                <span class="market-name">🎲 ${PASARAN[i]}</span>
                <button class="copy-btn" data-market="${PASARAN[i].replace(/'/g, "\\'")}">📋 Copy</button>
            </div>
            <div class="market-content">
                <div class="market-row"><span class="market-row-label">BBFS KUAT:</span><span class="market-row-value">${p.bbfs}</span></div>
                <div class="market-row"><span class="market-row-label">Angka Main:</span><span class="market-row-value">${p.angkaMain}</span></div>
                <div class="market-row"><span class="market-row-label">4D:</span><span class="market-row-value">${p.fourD[0]} ${p.fourD[1]}</span></div>
                <div class="market-row"><span class="market-row-label">3D:</span><span class="market-row-value">${p.threeD[0]} ${p.threeD[1]}</span></div>
                <div class="market-row"><span class="market-row-label">2D Top 5:</span><span class="market-row-value">${p.twoD.slice(0,5).join(' ')}</span></div>
                <div class="market-row"><span class="market-row-label">Colok:</span><span class="market-row-value">${p.colok} | ${p.colok2d}</span></div>
            </div>
        </div>`;
    }
    html += `</div>`;
    document.getElementById('contentArea').innerHTML = html;
    
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const market = btn.getAttribute('data-market');
            copy(formatTeks(market), `Prediksi ${market} disalin!`);
        };
    });
}

// PENCARIAN
function cariPasaran() {
    const keyword = document.getElementById('searchInput').value.trim();
    const stats = document.getElementById('searchStats');
    
    if (keyword === "") {
        tampilkanSemua();
        return;
    }
    
    const hasil = PASARAN.filter(p => p.toLowerCase().includes(keyword.toLowerCase()));
    
    if (hasil.length === 0) {
        stats.style.display = 'block';
        stats.innerHTML = `🔍 <span>0</span> pasaran ditemukan. Coba kata kunci lain.`;
        document.getElementById('contentArea').innerHTML = `<div class="empty-search">😢 Tidak ada pasaran yang cocok dengan "<strong>${keyword}</strong>"<br><br>💡 Coba: MACAU, SYDNEY, HONGKONG, atau klik tombol TAMPILKAN ALL</div>`;
        return;
    }
    
    if (hasil.length === 1) {
        // Tampilkan detail satu pasaran
        const p = getPrediksi(hasil[0]);
        const tgl = getTanggal();
        const jam = getJam();
        stats.style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
        <div class="single-card">
            <div class="single-header">
                <div><h2>🎯 ${hasil[0]}</h2><div class="date">📅 ${tgl} | ${jam}</div></div>
                <button id="copySingleBtn" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);border:none;padding:10px 20px;border-radius:40px;font-weight:bold;cursor:pointer;">📋 COPY PREDIKSI</button>
            </div>
            <div class="prediction-grid">
                <div class="pred-item"><div class="pred-label">BBFS KUAT</div><div class="pred-value">${p.bbfs}</div></div>
                <div class="pred-item"><div class="pred-label">Angka Main</div><div class="pred-value">${p.angkaMain}</div></div>
                <div class="pred-item"><div class="pred-label">4D (BB)</div><div class="pred-value">${p.fourD.join(' · ')}</div></div>
                <div class="pred-item"><div class="pred-label">3D (BB)</div><div class="pred-value">${p.threeD.join(' · ')}</div></div>
                <div class="pred-item"><div class="pred-label">2D (BB)</div><div class="pred-value">${p.twoD.map(n => `<span class="number-badge">${n}</span>`).join('')}</div></div>
                <div class="pred-item"><div class="pred-label">Colok Bebas</div><div class="pred-value">${p.colok}</div></div>
                <div class="pred-item"><div class="pred-label">Colok Bebas 2D</div><div class="pred-value">${p.colok2d}</div></div>
                <div class="pred-item"><div class="pred-label">Colok Shio</div><div class="pred-value">${p.shio}</div></div>
                <div class="pred-item"><div class="pred-label">Invest Twin</div><div class="pred-value">${p.twin}</div></div>
            </div>
        </div>`;
        document.getElementById('copySingleBtn').onclick = () => copy(formatTeks(hasil[0]), `Prediksi ${hasil[0]} disalin!`);
    } else {
        stats.style.display = 'block';
        stats.innerHTML = `🔍 Menampilkan <span>${hasil.length}</span> pasaran dari total ${PASARAN.length} (pencarian: ${keyword})`;
        
        let html = `<div class="markets-grid">`;
        for (let i = 0; i < hasil.length; i++) {
            const p = getPrediksi(hasil[i]);
            html += `
            <div class="market-item">
                <div class="market-header">
                    <span class="market-name">🎲 ${hasil[i]}</span>
                    <button class="copy-result-btn" data-market="${hasil[i].replace(/'/g, "\\'")}">📋 Copy</button>
                </div>
                <div class="market-content">
                    <div class="market-row"><span class="market-row-label">BBFS KUAT:</span><span class="market-row-value">${p.bbfs}</span></div>
                    <div class="market-row"><span class="market-row-label">Angka Main:</span><span class="market-row-value">${p.angkaMain}</span></div>
                    <div class="market-row"><span class="market-row-label">4D:</span><span class="market-row-value">${p.fourD[0]}</span></div>
                    <div class="market-row"><span class="market-row-label">3D:</span><span class="market-row-value">${p.threeD[0]}</span></div>
                    <div class="market-row"><span class="market-row-label">2D Top 5:</span><span class="market-row-value">${p.twoD.slice(0,5).join(' ')}</span></div>
                </div>
            </div>`;
        }
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        
        document.querySelectorAll('.copy-result-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const market = btn.getAttribute('data-market');
                copy(formatTeks(market), `Prediksi ${market} disalin!`);
            };
        });
    }
}

// Update jam
function updateJam() {
    document.getElementById('dateTime').innerHTML = getTanggal() + ' | ' + getJam();
}

// Inisialisasi
document.addEventListener('DOMContentLoaded', () => {
    // Isi dropdown
    const select = document.getElementById('marketSelect');
    select.innerHTML = '<option value="">-- Pilih Pasaran --</option>';
    PASARAN.forEach(p => {
        let opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
    });
    
    select.onchange = () => {
        if (select.value) {
            document.getElementById('searchInput').value = select.value;
            cariPasaran();
        }
    };
    
    document.getElementById('searchInput').oninput = cariPasaran;
    document.getElementById('showAllBtn').onclick = () => {
        document.getElementById('searchInput').value = '';
        tampilkanSemua();
    };
    
    // COPY ALL - tanpa tanda ========
    document.getElementById('copyAllBtn').onclick = () => {
        let semuaTeks = '';
        for (let i = 0; i < PASARAN.length; i++) {
            semuaTeks += formatTeks(PASARAN[i]);
            if (i < PASARAN.length - 1) semuaTeks += '\n\n';
        }
        copy(semuaTeks, 'Semua 53 pasaran berhasil disalin!');
    };
    
    updateJam();
    setInterval(updateJam, 1000);
    
    // Tampilkan semua pasaran saat pertama kali load
    tampilkanSemua();
});
</script>
</body>
</html>
